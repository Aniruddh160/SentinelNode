<!DOCTYPE html>
<html>
<head>

<title>SentinelNode</title>

<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-gray-900 text-white">

<div class="flex h-screen">

    <!-- Sidebar -->
    <div class="w-64 bg-gray-800 p-6">
        <h1 class="text-xl font-bold mb-8">SentinelNode</h1>
        <ul class="space-y-4">
            <li class="text-blue-400">Dashboard</li>
            <li>Data Ingestion</li>
            <li>Knowledge Graph</li>
            <li>Reports</li>
            <li>Settings</li>
        </ul>
    </div>

    <!-- Main + Graph Wrapper -->
    <div class="flex-1 flex">

        <!-- LEFT PANEL -->
        <div class="w-1/2 p-8 overflow-y-auto">

            <h2 class="text-xl mb-4">Search & Discovery - RAG</h2>

            <!-- LOCAL -->
            <div class="mb-4">
                <h3>📁 Local Folder</h3>
                <input id="folderPath" type="text" placeholder="Enter folder path..." class="w-full p-2 bg-gray-800 rounded mt-2"/>
                <button id="indexFolderBtn" class="mt-2 bg-blue-500 px-4 py-2 rounded">Index Folder</button>
            </div>

            <!-- GITHUB -->
            <div class="mb-4">
                <h3>🌐 GitHub Repo</h3>
                <input id="repoUrl" type="text" placeholder="Paste GitHub repo URL..." class="w-full p-2 bg-gray-800 rounded mt-2"/>
                <button id="cloneRepoBtn" class="mt-2 bg-blue-500 px-4 py-2 rounded">Clone & Index</button>
            </div>

            <!-- QUERY -->
            <input
                id="queryInput"
                type="text"
                placeholder="Ask about your system..."
                class="w-full p-3 bg-gray-800 rounded mt-4"
            />

            <button
                onclick="askQuestion()"
                class="mt-4 bg-blue-500 px-6 py-2 rounded"
            >
                Ask
            </button>

            <div id="answerBox" class="mt-6 p-4 bg-gray-800 rounded">
                Answer will appear here
            </div>

        </div>

        <!-- RIGHT PANEL (GRAPH) -->
<div class="w-1/2 bg-gray-800 border-l border-gray-700 flex flex-col h-screen">

    <div class="p-4 border-b border-gray-700">
        <h2 class="text-lg font-semibold">
            Impact Analysis - Knowledge Graph
        </h2>
    </div>

    <!-- 👇 THIS IS THE REAL FIX -->
    <div class="flex-1 relative">
        <div id="graphContainer" class="absolute inset-0"></div>
    </div>

</div>

</div>

<script src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
<script src="/static/js/app.js"></script>

</body>
</html>
