<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>SentinelNode</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>

<style>
body {
  font-family: 'Inter', sans-serif;
  line-height: 1.55;
}

.chat-history {
  height: calc(100vh - 140px);
  overflow-y: auto;
  padding-right: 6px;
}

.chat-history::-webkit-scrollbar {
  width: 6px;
}

.chat-history::-webkit-scrollbar-thumb {
  background: #444;
  border-radius: 10px;
}

button {
  transition: all 0.2s ease;
}
</style>
</head>

<body class="bg-black text-gray-300 h-screen overflow-hidden">

<!-- ================= HEADER ================= -->

<div class="h-[60px] border-b border-gray-800 flex items-center px-4 bg-black">

  <!-- Sidebar Toggle -->
  <button onclick="toggleSidebar()" 
    class="mr-3 px-3 py-2 bg-[#111] border border-[#222] rounded-md hover:bg-[#1a1a1a] text-gray-300">
    ☰
  </button>

  <!-- Logo -->
  <button onclick="goHome()" class="text-white font-medium text-lg">
    SentinelNode
  </button>

</div>


<!-- ================= HOME ================= -->
<div id="home-screen" class="h-[calc(100vh-60px)] flex">

  <div class="w-[250px] border-r border-gray-800 p-6">
    <h1 class="text-lg font-medium text-white">SentinelNode</h1>

    <button onclick="startNewChat()" 
      class="mt-4 w-full text-left px-3 py-2 rounded-md bg-white text-black hover:bg-gray-200 text-sm">
      + New Chat
    </button>
  </div>

  <div class="flex-1 flex flex-col items-center justify-center px-6">
    <div class="max-w-lg w-full text-center space-y-8">

      <div>
        <h2 class="text-xl text-white">What do you want to explore?</h2>
        <p class="text-sm text-gray-400">
          Give SentinelNode a codebase. It maps the structure and lets you ask questions.
        </p>
      </div>

      <div class="flex justify-center gap-4">
        <button onclick="showLocalInput()" class="bg-white text-black px-4 py-2 rounded-md hover:bg-gray-200">
          Use local folder
        </button>

        <button onclick="showRepoInput()" class="border border-gray-600 px-4 py-2 rounded-md hover:bg-gray-800">
          Clone GitHub repo
        </button>
      </div>

      <div id="local-input" class="hidden flex gap-2 justify-center">
        <input id="local-path" placeholder="Enter folder path"
          class="p-3 rounded-md bg-[#0f0f0f] border border-gray-700 w-[300px]" />
        <button onclick="indexLocal()" class="bg-white text-black px-3 rounded-md hover:bg-gray-200">
          Index
        </button>
      </div>

      <div id="repo-input" class="hidden flex gap-2 justify-center">
        <input id="repo-url" placeholder="Enter GitHub URL"
          class="p-3 rounded-md bg-[#0f0f0f] border border-gray-700 w-[300px]" />
        <button onclick="indexRepo()" class="bg-white text-black px-3 rounded-md hover:bg-gray-200">
          Clone & Index
        </button>
      </div>

    </div>
  </div>

  <div class="w-[30%] border-l border-gray-800 flex items-center justify-center text-sm text-gray-400 p-6">
    Load a project and explore how files connect.
  </div>

</div>

<!-- ================= CHAT ================= -->
<div id="chat-screen" class="hidden flex h-[calc(100vh-60px)]">

  <!-- Sidebar -->
  <div id="sidebar" class="w-[250px] border-r border-gray-800 p-6 flex flex-col h-screen transition-all duration-300">

    <h1 class="text-lg font-medium text-white">SentinelNode</h1>

    <button onclick="startNewChat()" 
      class="mt-4 w-full text-left px-3 py-2 rounded-md bg-white text-black hover:bg-gray-200 text-sm">
      + New Chat
    </button>

    <div class="mt-6 flex-1 flex flex-col">
      <p class="text-xs text-gray-500 mb-2">Chat History</p>

      <div id="chat-history" class="chat-history space-y-2 text-sm"></div>
    </div>

  </div>

  <!-- Chat -->
  <div class="flex-1 flex flex-col">
<div class="relative">

</div>
    <div id="context-info" class="p-4 border-b border-gray-800 text-sm text-gray-400">
      Loading...
    </div>

    <div id="chat-messages" class="flex-1 overflow-y-auto p-6">
      <div id="chat-inner" class="max-w-3xl mx-auto space-y-4"></div>
    </div>

    <div class="p-4 border-t border-gray-800 flex gap-2">
      <input id="user-input" placeholder="Ask about your codebase"
        class="flex-1 p-4 rounded-md bg-[#0f0f0f] border border-gray-700 outline-none" />

      <button onclick="sendMessage()"
        class="px-4 rounded-md bg-white text-black hover:bg-gray-200">
        Send
      </button>
    </div>

  </div>
  <!-- DRAG HANDLE -->
    <div id="resizer" class="w-[5px] cursor-col-resize bg-gray-800 hover:bg-gray-600"></div>


  <!-- Graph -->
  <div id="graph-container" class="w-[35%] min-w-[250px] border-l border-gray-800 flex flex-col h-screen overflow-hidden">
      <div class="p-3 text-xs tracking-wide text-gray-500 border-b border-gray-800">
        Knowledge Graph
      </div>
      <div id="resizer" 
     class="w-[4px] bg-gray-800 hover:bg-white/30 transition-all cursor-col-resize">
</div>
      <div id="network" class="flex-1 overflow-hidden"></div>
    </div>

  </div>
<script>



function goHome() {
  document.getElementById("chat-screen").classList.add("hidden");
  document.getElementById("home-screen").classList.remove("hidden");
  window.scrollTo(0, 0);
}

// ================= SIDEBAR TOGGLE =================
let sidebarVisible = true;

function toggleSidebar() {
  const sidebar = document.getElementById("sidebar");

  if (sidebarVisible) {
    sidebar.style.width = "0px";
    sidebar.style.padding = "0px";
    sidebar.style.overflow = "hidden";
  } else {
    sidebar.style.width = "250px";
    sidebar.style.padding = "24px";
  }

  sidebarVisible = !sidebarVisible;
}

// ================= NAV =================
function goToChat() {
  document.getElementById("home-screen").classList.add("hidden");
  document.getElementById("chat-screen").classList.remove("hidden");
}

// ================= INPUT =================
function showLocalInput() {
  document.getElementById("local-input").classList.remove("hidden");
  document.getElementById("repo-input").classList.add("hidden");
}

function showRepoInput() {
  document.getElementById("repo-input").classList.remove("hidden");
  document.getElementById("local-input").classList.add("hidden");
}

// ================= INDEX =================
async function indexLocal() {
  const path = document.getElementById("local-path").value;

  await fetch("/index-folder", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ path })
  });

  document.getElementById("context-info").innerText = path;
  goToChat();
  setTimeout(loadGraph, 1000);
}

async function indexRepo() {
  const url = document.getElementById("repo-url").value;

  await fetch("/clone-repo", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ repo_url: url })
  });

  document.getElementById("context-info").innerText = url;
  goToChat();
  setTimeout(loadGraph, 1000);
}

// ================= CHAT =================

function formatResponse(text) {
  if (!text) return "";

  // 🔥 Convert bullets
  text = text.replace(/- /g, "<br>• ");

  // 🔥 Add spacing after sentences
  text = text.replace(/\. /g, ".<br><br>");

  // 🔥 Fix line breaks
  text = text.replace(/\n/g, "<br>");

  return text;
}


function addMessage(text, sender="user") {
  const chatInner = document.getElementById("chat-inner");

  const div = document.createElement("div");
    if (sender === "user") {
    div.className = "flex justify-end";

    div.innerHTML = `
      <div class="bg-white text-black px-3 py-1.5 rounded-xl max-w-[50%] text-sm border border-gray-300">
        ${text}
      </div>
    `;
  } else {
    div.className = "w-full";

div.innerHTML = `
  <div class="max-w-3xl w-full px-5 py-4 
              bg-[#111111] 
              text-gray-300 text-[14px] leading-relaxed 
              whitespace-pre-wrap
              rounded-xl
              border border-[#1f1f1f]
              transition-all duration-200 hover:border-[#2a2a2a]">

    ${formatResponse(text)}

  </div>
`;
  }

  chatInner.appendChild(div);
}

// ================= STATE =================
let chatSessions = JSON.parse(localStorage.getItem("chatSessions") || "[]");
let currentChat = JSON.parse(localStorage.getItem("currentChat") || "[]");

// ================= SEND =================
async function sendMessage() {
  const input = document.getElementById("user-input");
  const question = input.value.trim();
  if (!question) return;

  addMessage(question, "user");
  currentChat.push({ text: question, sender: "user" });


  if (currentChat.length === 1) {
    let sessions = JSON.parse(localStorage.getItem("chatSessions") || "[]");

    sessions.push({
      id: Date.now(),
      title: question,
      messages: [...currentChat]
    });

    localStorage.setItem("chatSessions", JSON.stringify(sessions));
    chatSessions = sessions;

    renderChatHistory();
  }

  input.value = "";

  const res = await fetch("/query", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ question })
  });

  const data = await res.json();
  addMessage(data.answer, "ai");

  currentChat.push({ text: data.answer, sender: "ai" });

  //  UPDATE LAST SESSION
  let sessions = JSON.parse(localStorage.getItem("chatSessions") || "[]");

  if (sessions.length > 0) {
    sessions[sessions.length - 1].messages = [...currentChat];
    localStorage.setItem("chatSessions", JSON.stringify(sessions));
  }
  localStorage.setItem("currentChat", JSON.stringify(currentChat));
}

// ================= SAVE =================
function saveChat() {
  if (!currentChat.length) return;

  let sessions = JSON.parse(localStorage.getItem("chatSessions") || "[]");

  sessions.push({
    id: Date.now(),
    title: currentChat[0]?.text || "New Chat",
    messages: [...currentChat]
  });

  localStorage.setItem("chatSessions", JSON.stringify(sessions));

  // refresh global variable
  chatSessions = sessions;

  localStorage.removeItem("currentChat");

  renderChatHistory();
}

// ================= NEW CHAT =================
function startNewChat() {
  saveChat();

  currentChat = [];
  localStorage.removeItem("currentChat");

  document.getElementById("chat-inner").innerHTML = "";

  // go back to home screen (correct behavior)
  document.getElementById("chat-screen").classList.add("hidden");
  document.getElementById("home-screen").classList.remove("hidden");
}
// ================= HISTORY =================
function renderChatHistory() {
  const container = document.getElementById("chat-history");
  container.innerHTML = "";

  chatSessions = JSON.parse(localStorage.getItem("chatSessions") || "[]");

  chatSessions.slice().reverse().forEach(chat => {
    const div = document.createElement("div");

    // 🔥 fallback for old chats
    let title = chat.title || chat.messages?.[0]?.text || "New Chat";

    if (title.length > 35) {
      title = title.substring(0, 35) + "...";
    }

    div.className = `
        p-2 
        bg-[#111111] 
        border border-[#1f1f1f]
        rounded-md 
        cursor-pointer 
        hover:bg-[#1a1a1a]
        transition-all duration-150
        text-gray-300
      `;

    if (JSON.stringify(chat.messages) === JSON.stringify(currentChat)) {
        div.classList.add("bg-[#1a1a1a]", "border-gray-500");
      }
    div.innerText = title;

    div.onclick = () => loadChat(chat);

    container.appendChild(div);
  });
}

function loadChat(chat) {
  currentChat = chat.messages;
  localStorage.setItem("currentChat", JSON.stringify(currentChat));

  document.getElementById("chat-inner").innerHTML = "";

  currentChat.forEach(msg => {
    addMessage(msg.text, msg.sender);
  });

  goToChat();
}

// ================= RESIZER =================
const resizer = document.getElementById("resizer");
const graph = document.getElementById("graph-container");

let isResizing = false;

resizer.addEventListener("mousedown", () => {
  isResizing = true;
  document.body.style.cursor = "col-resize";
});

document.addEventListener("mousemove", (e) => {
  if (!isResizing) return;

  const newWidth = window.innerWidth - e.clientX;

  if (newWidth > 250 && newWidth < window.innerWidth * 0.7) {
    graph.style.width = newWidth + "px";
  }
});

document.addEventListener("mouseup", () => {
  isResizing = false;
  document.body.style.cursor = "default";
});


// ================= GRAPH =================
let network;

async function loadGraph() {
  const res = await fetch("/get-graph");
  const data = await res.json();

  network = new vis.Network(
    document.getElementById("network"),
    data,
    { edges: { arrows: "to" } }
  );
}

// ================= INIT =================
document.addEventListener("DOMContentLoaded", () => {
  renderChatHistory();

  if (currentChat.length > 0) {
    currentChat.forEach(msg => addMessage(msg.text, msg.sender));
    goToChat();
  }

  document.getElementById("user-input").addEventListener("keydown", e => {
    if (e.key === "Enter") sendMessage();
  });
});
</script>

</body>
</html>
