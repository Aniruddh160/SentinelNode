<!DOCTYPE html>
<html>
<head>

<title>SentinelNode</title>

<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-gray-900 text-white">

<div class="flex h-screen">

<!-- Sidebar -->

<div class="w-64 bg-gray-800 p-6">

<h1 class="text-xl font-bold mb-8">SentinelNode</h1>

<ul class="space-y-4">

<li class="text-blue-400">Dashboard</li>
<li>Data Ingestion</li>
<li>Knowledge Graph</li>
<li>Reports</li>
<li>Settings</li>

</ul>

</div>


<!-- Main Panel -->

<div class="flex-1 p-8">

<h2 class="text-xl mb-4">Search & Discovery - RAG</h2>
<input
id="folderPath"
placeholder="Enter folder path"
class="w-full p-3 bg-gray-800 rounded"
/>

<button
onclick="indexFolder()"
class="mt-4 bg-green-500 px-6 py-2 rounded"
>
Index Folder
</button>



<input
id="queryInput"
type="text"
placeholder="Ask about your system..."
class="w-full p-3 bg-gray-800 rounded"
/>

<button
onclick="askQuestion()"
class="mt-4 bg-blue-500 px-6 py-2 rounded"
>
Ask
</button>

<div
id="answerBox"
class="mt-6 p-4 bg-gray-800 rounded"
>
Answer will appear here
</div>

</div>


<!-- Graph Panel -->

<div class="w-1/3 bg-gray-800 p-6">

<h2 class="text-lg mb-4">Impact Analysis - Knowledge Graph</h2>

<div id="graph" class="h-96"></div>

</div>

</div>

<script src="/static/js/app.js"></script>

</body>
</html>
